[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
fs_permissions = [{ access = "read", path = "./test/fixtures" }]
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

[fuzz]
runs = 256
